
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTIM Support - Sistema de Soporte Técnico</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0c0f17;
            --app-bg: radial-gradient(circle at 50% 50%, #161b2e 0%, #0c0f17 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --secondary-accent: #9d50bb;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --success: #00e676;
            --warning: #ffb300;
            --error: #ff5252;
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--text-primary); background: var(--app-bg); min-height: 100vh; overflow-x: hidden; line-height: 1.6; }
        .app-container { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
        .glass-nav { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 1.2rem; padding: 1rem 2rem; margin-bottom: 2rem; box-shadow: var(--card-shadow); }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 0.8rem; font-size: 1.5rem; font-weight: 700; font-family: 'Poppins', sans-serif; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }
        .logo-icon { color: var(--accent); filter: drop-shadow(0 0 8px var(--accent-glow)); }
        .screen-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 2rem; animation: slideUp 0.5s ease-out; }
        @media (max-width: 992px) { .screen-layout { grid-template-columns: 1fr; } }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(8px); border: 1px solid var(--glass-border); border-radius: 1.5rem; padding: 2rem; box-shadow: var(--card-shadow); height: fit-content; }
        .glass-card h2 { font-family: 'Poppins', sans-serif; font-size: 1.8rem; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.4rem; }
        .form-input, .form-select, .form-textarea { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border); border-radius: 0.8rem; padding: 0.8rem 1rem; color: white; outline: none; transition: border 0.3s; }
        .form-input:focus { border-color: var(--accent); }
        .btn { padding: 0.8rem 1.5rem; border-radius: 0.8rem; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 0.6rem; transition: all 0.3s; }
        .btn-primary { background: var(--accent); color: var(--bg-color); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid var(--glass-border); }
        .ticket-item { background: rgba(0, 0, 0, 0.2); border-radius: 1rem; padding: 1.2rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent); cursor: pointer; transition: transform 0.2s; }
        .ticket-item:hover { transform: translateX(5px); background: rgba(255,255,255,0.05); }
        .status-badge { font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 0.5rem; text-transform: uppercase; font-weight: 700; background: var(--accent); color: #000; }
        .login-screen { display: flex; justify-content: center; align-items: center; min-height: 70vh; }
        .login-card { max-width: 450px; width: 100%; text-align: center; }
        .content-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="app" class="app-container">
        <nav class="glass-nav">
            <div class="nav-content">
                <div class="logo"><i data-lucide="shield-check" class="logo-icon"></i><span>GTIM <span>Soporte</span></span></div>
                <div id="nav-actions-container"></div>
            </div>
        </nav>
        <main id="main-content" class="content-fade">
            <div style="display: flex; justify-content: center; align-items: center; min-height: 50vh; flex-direction: column; gap: 1rem;">
                <div class="logo" style="font-size: 2rem;">Iniciando Sistema...</div>
            </div>
        </main>
    </div>

    <script>

// CONFIGURACIÓN DE SUPABASE FINAL
        const SUPABASE_URL = 'https://xpdvvdnwzqyjvnxpivvc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_18PzzKKfqb20-ksjQGF_8g_-oZZNUll';
        
        // Inicializar cliente de Supabase
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let state = {
            currentUser: null,
            currentView: 'login',
            tickets: []
        };

        async function init() {
            render();
            if (window.lucide) window.lucide.createIcons();
        }

        const render = () => {
            const main = document.getElementById('main-content');
            const navActions = document.getElementById('nav-actions-container');
            main.innerHTML = '';
            navActions.innerHTML = '';

            if (state.currentUser) {
                navActions.innerHTML = `<button class="btn btn-secondary" onclick="logout()">Salir (${state.currentUser.nombre_completo})</button>`;
            }

            switch (state.currentView) {
                case 'login': main.appendChild(renderLogin()); break;
                case 'register': main.appendChild(renderRegister()); break;
                case 'home': main.appendChild(renderHome()); break;
                case 'support': main.appendChild(renderSupportList()); break;
            }
            if (window.lucide) window.lucide.createIcons();
        };

        const renderLogin = () => {
            const div = document.createElement('div');
            div.className = 'login-screen content-fade';
            div.innerHTML = `
                <div class="glass-card login-card">
                    <h2>Iniciar Sesión</h2>
                    <form onsubmit="event.preventDefault(); handleLogin(this);">
                        <div class="form-group"><label>Email</label><input type="email" name="email" class="form-input" required></div>
                        <div class="form-group"><label>Contraseña</label><input type="password" name="password" class="form-input" required></div>
                        <button type="submit" class="btn btn-primary" style="width:100%">Entrar</button>
                    </form>
                    <p style="margin-top:1.5rem; font-size:0.8rem">¿No tienes cuenta? <a href="#" onclick="state.currentView='register'; render()" style="color:var(--accent)">Regístrate aquí</a></p>
                    <div style="background:rgba(255,255,255,0.05); padding:1rem; border-radius:0.8rem; margin-top:1.5rem; font-size:0.75rem; color:var(--text-secondary)">
                        <strong>Acceso de prueba:</strong><br>
                        Admin: admin@gtim.com / gtim123
                    </div>
                </div>
            `;
            return div;
        };

        const renderRegister = () => {
            const div = document.createElement('div');
            div.className = 'login-screen content-fade';
            div.innerHTML = `
                <div class="glass-card login-card">
                    <h2>Crear Cuenta</h2>
                    <form onsubmit="event.preventDefault(); handleRegister(this);">
                        <div class="form-group"><label>Nombre Completo</label><input type="text" name="name" class="form-input" required></div>
                        <div class="form-group"><label>Email</label><input type="email" name="email" class="form-input" required></div>
                        <div class="form-group"><label>Contraseña</label><input type="password" name="password" class="form-input" required></div>
                        <button type="submit" class="btn btn-primary" style="width:100%">Registrarse</button>
                    </form>
                    <button class="btn btn-secondary" style="width:100%; margin-top:1rem" onclick="state.currentView='login'; render()">Volver al Login</button>
                </div>
            `;
            return div;
        };

        const renderHome = () => {
            const div = document.createElement('div');
            div.className = 'screen-layout content-fade';
            div.innerHTML = `
                <div class="glass-card">
                    <h2>Nueva Solicitud</h2>
                    <form onsubmit="event.preventDefault(); handleCreateTicket(this);">
                        <div class="form-group"><label>Proyecto</label><input type="text" name="proyecto" class="form-input" required placeholder="Ej: Redes, Software..."></div>
                        <div class="form-group"><label>Prioridad</label>
                            <select name="prioridad" class="form-select"><option value="Baja">Baja</option><option value="Media">Media</option><option value="Alta">Alta</option></select>
                        </div>
                        <div class="form-group"><label>Descripción del Problema</label><textarea name="descripcion" class="form-textarea" required rows="4" placeholder="Describe tu problema aquí..."></textarea></div>
                        <button type="submit" class="btn btn-primary" style="width:100%">Enviar a Soporte</button>
                    </form>
                </div>
                <div class="glass-card">
                    <h2>Mis Solicitudes</h2>
                    <div id="user-tickets-list" style="max-height: 400px; overflow-y: auto;">Cargando...</div>
                </div>
            `;
            loadUserTickets();
            return div;
        };

        const renderSupportList = () => {
            const div = document.createElement('div');
            div.className = 'glass-card content-fade';
            div.innerHTML = `
                <h2>Panel de Soporte GTIM</h2>
                <div id="support-tickets-list" style="margin-top:2rem">Cargando tickets de toda la empresa...</div>
            `;
            loadAllTickets();
            return div;
        };

        // --- LÓGICA DE DATOS CON SUPABASE ---

        async function handleLogin(form) {
            const { data, error } = await supabaseClient.from('usuarios').select('*').eq('email', form.email.value).eq('password', form.password.value).single();
            if (data) {
                state.currentUser = data;
                state.currentView = data.rol === 'Usuario Soporte Tecnico' ? 'support' : 'home';
                render();
            } else {
                alert('Email o contraseña incorrectos. Revisa tu acceso de prueba.');
            }
        }

        async function handleRegister(form) {
            const { error } = await supabaseClient.from('usuarios').insert([
                { nombre_completo: form.name.value, email: form.email.value, password: form.password.value, rol: 'Usuario Solicitante' }
            ]);
            if (!error) {
                alert('¡Cuenta creada! Ya puedes iniciar sesión.');
                state.currentView = 'login';
                render();
            } else {
                alert('Error al registrar: ' + error.message);
            }
        }

        async function handleCreateTicket(form) {
            const { error } = await supabaseClient.from('tickets').insert([
                { 
                    proyecto: form.proyecto.value, 
                    prioridad: form.prioridad.value, 
                    descripcion: form.descripcion.value,
                    autor_nombre: state.currentUser.nombre_completo,
                    autor_email: state.currentUser.email,
                    estado: 'Abierto'
                }
            ]);
            if (!error) {
                alert('Ticket enviado correctamente. Un técnico lo revisará pronto.');
                form.reset();
                loadUserTickets();
            }
        }

        async function loadUserTickets() {
            const { data } = await supabaseClient.from('tickets').select('*').eq('autor_email', state.currentUser.email).order('created_at', { ascending: false });
            const list = document.getElementById('user-tickets-list');
            if (data && data.length > 0) {
                list.innerHTML = data.map(t => `
                    <div class="ticket-item">
                        <div><strong>${t.proyecto}</strong><br><small style="color:var(--text-secondary)">${t.descripcion}</small></div>
                        <span class="status-badge">${t.estado}</span>
                    </div>
                `).join('');
            } else {
                list.innerHTML = '<p style="color:var(--text-secondary); text-align:center">No tienes tickets registrados aún.</p>';
            }
        }

        async function loadAllTickets() {
            const { data } = await supabaseClient.from('tickets').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('support-tickets-list');
            if (data && data.length > 0) {
                list.innerHTML = data.map(t => `
                    <div class="ticket-item">
                        <div><strong>${t.autor_nombre}</strong> (${t.proyecto})<br><small>${t.descripcion}</small></div>
                        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:5px">
                            <span class="status-badge" style="background:var(--secondary-accent)">${t.prioridad}</span>
                            <small>${t.estado}</small>
                        </div>
                    </div>
                `).join('');
            } else {
                list.innerHTML = '<p style="text-align:center">No hay tickets pendientes en el sistema.</p>';
            }
        }

        window.logout = () => { state.currentUser = null; state.currentView = 'login'; render(); };

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
