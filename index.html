<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTIM Service Desk v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --text: #ffffff;
            --text-dim: #94a3b8;
            --critica: #ff3d00;
            --alta: #ff9100;
            --media: #ffea00;
            --baja: #00e676;
            --success: #00e676;
            --warning: #ffb300;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .container { max-width: 1300px; margin: 0 auto; padding: 25px; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; margin-bottom: 25px; }
        .logo { font-family: 'Poppins'; font-size: 1.6rem; font-weight: 700; color: white; display:flex; align-items:center; gap:10px; }
        .logo span { color: var(--accent); }

        .dashboard { display: grid; grid-template-columns: 1fr 1.2fr; gap: 25px; }
        @media (max-width: 1000px) { .dashboard { grid-template-columns: 1fr; } }
        
        .card { padding: 25px; }
        h3 { font-family: 'Poppins'; margin-bottom: 20px; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }

        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; font-weight: 600; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); 
            border-radius: 12px; color: white; outline: none; transition: 0.3s; font-size: 0.9rem;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        
        /* Efecto cuando falta un campo */
        input.error, select.error, textarea.error { border-color: var(--critica); background: rgba(255, 61, 0, 0.1); }

        .main-btn {
            background: var(--accent); color: #000; padding: 15px; border-radius: 12px; border: none;
            font-weight: 700; cursor: pointer; width: 100%; text-transform: uppercase; margin-top:10px; transition: 0.3s;
        }
        .main-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 20px var(--accent-glow); }

        .ticket-list { max-height: 700px; overflow-y: auto; padding-right: 10px; }
        .ticket-item { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 15px;
            padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; gap: 20px;
            border-left: 4px solid var(--accent);
        }
        .priority-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dot-critica { background: var(--critica); box-shadow: 0 0 10px var(--critica); }
        .dot-alta { background: var(--alta); }
        .dot-media { background: var(--media); }
        .dot-baja { background: var(--baja); }

        .badge { padding: 4px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .bg-open { background: var(--accent); color: black; }
        .bg-process { background: var(--warning); color: black; }
        .bg-closed { background: #4a5568; color: white; }

        .login-wrap { display: grid; place-items: center; height: 80vh; }
        .login-box { width: 400px; padding: 40px; text-align: center; }

        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; place-items:center; z-index:1000; }
        .modal-content { max-width: 500px; width: 90%; padding: 30px; }
    </style>
</head>
<body>

    <div class="container">
        <nav class="glass">
            <div class="logo"><i data-lucide="layout"></i> GTIM <span>SERVICE DESK</span></div>
            <div id="nav-actions"></div>
        </nav>
        <div id="main-view"></div>
    </div>

    <!-- Modal para cerrar ticket -->
    <div id="resolve-modal" class="modal">
        <div class="glass modal-content">
            <h3>Finalizar Solicitud</h3>
            <div class="form-group">
                <label>Respuesta de Soporte</label>
                <textarea id="resolve-msg" rows="4" placeholder="Describe la solución aplicada..."></textarea>
            </div>
            <div style="display:flex; gap:10px">
                <button class="main-btn" onclick="app.confirmResolve()" style="background:var(--success)">Cerrar Ticket</button>
                <button class="main-btn" onclick="document.getElementById('resolve-modal').style.display='none'" style="background:#555">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xpdvvdnwzqyjvnxpivvc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_18PzzKKfqb20-ksjQGF_8g_-oZZNUll';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let user = null;
        let activeTicketId = null;

        const app = {
            init: () => { app.show('login'); },
            show: (view) => {
                const views = {
                    login: `
                        <div class="login-wrap">
                            <div class="glass login-box">
                                <h2 style="margin-bottom:20px">Inicia Sesión</h2>
                                <input type="email" id="l-email" placeholder="Correo GTIM" style="margin-bottom:15px">
                                <input type="password" id="l-pass" placeholder="Contraseña" style="margin-bottom:20px">
                                <button class="main-btn" onclick="app.doLogin()">Ingresar</button>
                                <p style="margin-top:20px; font-size:0.8rem">¿Sin cuenta? <a href="#" onclick="app.show('reg')" style="color:var(--accent)">Regístrate</a></p>
                            </div>
                        </div>`,
                    reg: `
                        <div class="login-wrap">
                            <div class="glass login-box">
                                <h2>Registro</h2>
                                <input type="text" id="r-name" placeholder="Nombre Completo" style="margin-bottom:15px">
                                <input type="email" id="r-email" placeholder="Email @gtim.com" style="margin-bottom:15px">
                                <input type="password" id="r-pass" placeholder="Password" style="margin-bottom:20px">
                                <button class="main-btn" onclick="app.doReg()">Crear Cuenta</button>
                                <button class="main-btn" onclick="app.show('login')" style="background:transparent; color:white; border:1px solid var(--glass-border)">Volver</button>
                            </div>
                        </div>`,
                    home: `
                        <div class="dashboard">
                            <div class="glass card">
                                <h3><i data-lucide="send"></i> Nueva Solicitud</h3>
                                <div class="field-row">
                                    <div class="form-group"><label>Proyecto</label><input type="text" id="f-proy" placeholder="Ej: Redes"></div>
                                    <div class="form-group"><label>Área</label>
                                        <select id="f-area">
                                            <option value="">-- Selecciona --</option><option>QA</option><option>DEV</option><option>F4</option><option>OTROS</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="field-row">
                                    <div class="form-group"><label>Tipo de Solicitud</label>
                                        <select id="f-tipo">
                                            <option value="">-- Selecciona --</option>
                                            <option>Instalación de Imágenes</option><option>Respaldo de Imágenes</option><option>Encendido de equipos</option>
                                            <option>Configuración de impresoras</option><option>Validar conexión a la red</option><option>Carga de Respaldos</option>
                                            <option>Movimiento de equipos</option><option>Instalación de imagen base</option><option>Solicitud de Cables de red</option>
                                            <option>Eliminación de respaldos</option><option>Habilitación de espacios de trabajo</option><option>Instalación de escaner</option>
                                            <option>Instalación de drivers</option><option>Rasurado de imágenes</option><option>Creación de imágenes virtuales</option>
                                            <option>Solicitud de IPs</option><option>Solicitud de información</option>
                                        </select>
                                    </div>
                                    <div class="form-group"><label>Prioridad</label>
                                        <select id="f-prio">
                                            <option value="">-- Selecciona --</option><option>Baja</option><option>Media</option><option>Alta</option><option>Critica</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="field-row">
                                    <div class="form-group"><label>Información del Equipo</label><input type="text" id="f-info" placeholder="PC-001 / IP"></div>
                                    <div class="form-group"><label>Modelo del Equipo</label><input type="text" id="f-mod" placeholder="HP / Dell"></div>
                                </div>
                                <div class="form-group"><label>Descripción del Problema</label><textarea id="f-desc" rows="3" placeholder="Describe tu solicitud..."></textarea></div>
                                <button class="main-btn" onclick="app.sendTicket()">Enviar Ticket</button>
                            </div>
                            <div class="glass card">
                                <h3><i data-lucide="archive"></i> Mis Solicitudes</h3>
                                <div id="user-list" class="ticket-list">Cargando...</div>
                            </div>
                        </div>`,
                    admin: `
                        <div class="glass card">
                            <h3><i data-lucide="shield"></i> Master Control Panel</h3>
                            <div id="admin-list" class="ticket-list">Cargando panorama global...</div>
                        </div>`
                };

                document.getElementById('main-view').innerHTML = views[view];
                lucide.createIcons();
                app.updateNav();
                if(view === 'home') app.loadUserTickets();
                if(view === 'admin') app.loadAdmin();
            },

            updateNav: () => {
                const nav = document.getElementById('nav-actions');
                nav.innerHTML = user ? `<button onclick="app.logout()" style="color:var(--text-dim); background:none; border:none; cursor:pointer">Salir (${user.nombre_completo})</button>` : '';
            },

            doLogin: async () => {
                const { data } = await sb.from('usuarios').select('*').eq('email', document.getElementById('l-email').value).eq('password', document.getElementById('l-pass').value).single();
                if(data) { user = data; app.show(user.rol === 'Usuario Soporte Tecnico' ? 'admin' : 'home'); }
                else alert("Credenciales incorrectas");
            },

            doReg: async () => {
                const { error } = await sb.from('usuarios').insert([{ nombre_completo: document.getElementById('r-name').value, email: document.getElementById('r-email').value, password: document.getElementById('r-pass').value }]);
                if(!error) { alert("¡Éxito! Logueate."); app.show('login'); }
            },

            sendTicket: async () => {
                // IDs de los campos a validar
                const fields = ['f-proy', 'f-area', 'f-tipo', 'f-prio', 'f-info', 'f-mod', 'f-desc'];
                let hasError = false;

                fields.forEach(id => {
                    const el = document.getElementById(id);
                    if (!el.value.trim()) {
                        el.classList.add('error');
                        hasError = true;
                    } else {
                        el.classList.remove('error');
                    }
                });

                if (hasError) {
                    alert("Por favor, llena todos los campos resaltados antes de enviar.");
                    return;
                }

                const now = new Date();
                const tckId = `TCK-${now.getDate()}${now.getMonth()+1}${now.getFullYear()}${now.getHours()}${now.getMinutes()}${now.getSeconds()}`;
                
                const ticket = {
                    id_solicitud: tckId,
                    proyecto: document.getElementById('f-proy').value,
                    area: document.getElementById('f-area').value,
                    tipo: document.getElementById('f-tipo').value,
                    prioridad: document.getElementById('f-prio').value,
                    equipo_info: document.getElementById('f-info').value,
                    equipo_modelo: document.getElementById('f-mod').value,
                    descripcion: document.getElementById('f-desc').value,
                    autor_nombre: user.nombre_completo,
                    autor_email: user.email,
                    estado: 'Abierto'
                };

                const { error } = await sb.from('tickets').insert([ticket]);
                if(!error) { 
                    alert("Ticket Enviado: " + tckId); 
                    app.show('home'); 
                } else {
                    alert("Error al enviar. Intenta de nuevo.");
                }
            },

            loadUserTickets: async () => {
                const { data } = await sb.from('tickets').select('*').eq('autor_email', user.email).order('id', {ascending: false});
                document.getElementById('user-list').innerHTML = data.map(t => `
                    <div class="ticket-item">
                        <div>
                            <small>${t.id_solicitud || 'S/N'}</small>
                            <h4>${t.proyecto || 'Sin Proyecto'}</h4>
                            <p>${t.tipo || 'General'}</p>
                        </div>
                        <div style="text-align:right">
                            <span class="badge ${t.estado === 'Abierto' ? 'bg-open' : t.estado === 'Cerrado' ? 'bg-closed' : 'bg-process'}">${t.estado}</span>
                            <div style="margin-top:5px; font-size:0.7rem">${t.tecnico_asignado ? 'Atendido por ' + t.tecnico_asignado : 'Pendiente'}</div>
                        </div>
                    </div>`).join('') || '<p style="text-align:center; color:var(--text-dim)">Aún no tienes tickets.</p>';
            },

            loadAdmin: async () => {
                const { data } = await sb.from('tickets').select('*').order('id', {ascending: false});
                document.getElementById('admin-list').innerHTML = data.map(t => `
                    <div class="ticket-item" style="border-left-color:${t.estado === 'En Proceso' ? 'var(--warning)' : t.estado === 'Cerrado' ? '#555' : 'var(--accent)'}">
                        <div style="flex:1">
                            <span class="priority-dot dot-${(t.prioridad || 'Baja').toLowerCase()}"></span>
                            <small>${t.id_solicitud || 'S/N'} | ${t.autor_nombre}</small>
                            <h4>${t.proyecto} - ${t.area}</h4>
                            <p>${t.tipo}</p>
                            <p style="margin-top:10px; color:white; background:rgba(0,0,0,0.2); padding:10px; border-radius:8px">${t.descripcion}</p>
                            ${t.respuesta ? `<p style="margin-top:10px; color:var(--success)"><b>Solución:</b> ${t.respuesta}</p>` : ''}
                        </div>
                        <div style="text-align:right; min-width:140px">
                            <span class="badge ${t.estado === 'Abierto' ? 'bg-open' : t.estado === 'Cerrado' ? 'bg-closed' : 'bg-process'}">${t.estado}</span>
                            <div style="margin-top:15px">
                                ${t.estado === 'Abierto' ? `<button class="main-btn" onclick="app.claim(${t.id})" style="font-size:0.7rem; padding:8px">Atender</button>` : 
                                  t.estado === 'En Proceso' && t.tecnico_asignado === user.nombre_completo ? `<button class="main-btn" onclick="app.openResolve(${t.id})" style="background:var(--success); font-size:0.7rem; padding:8px">Cerrar</button>` : 
                                  `<small style="color:var(--accent)">Por: ${t.tecnico_asignado || 'Técnico'}</small>`}
                            </div>
                        </div>
                    </div>`).join('');
            },

            claim: async (id) => {
                const { error } = await sb.from('tickets').update({ tecnico_asignado: user.nombre_completo, estado: 'En Proceso' }).eq('id', id);
                if(!error) app.loadAdmin();
            },

            openResolve: (id) => { 
                activeTicketId = id; 
                document.getElementById('resolve-msg').value = '';
                document.getElementById('resolve-modal').style.display = 'grid'; 
            },

            confirmResolve: async () => {
                const msg = document.getElementById('resolve-msg').value;
                if (!msg.trim()) { alert("Debes ingresar la respuesta de soporte para cerrar el ticket."); return; }
                
                const { error } = await sb.from('tickets').update({ estado: 'Cerrado', respuesta: msg, fecha_cierre: new Date() }).eq('id', activeTicketId);
                if(!error) { document.getElementById('resolve-modal').style.display = 'none'; app.loadAdmin(); }
            },

            logout: () => { user = null; app.show('login'); }
        };

        app.init();
    </script>
</body>
</html>
