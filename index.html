<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTIM Service Desk v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b101b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --text: #ffffff;
            --text-dim: #94a3b8;
            --critica: #ff3d00;
            --success: #00e676;
            --warning: #ffb300;
            --error-glow: rgba(255, 61, 0, 0.3);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; background: radial-gradient(circle at top right, #1a233a, #0b101b); }
        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .container { max-width: 1350px; margin: 0 auto; padding: 25px; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; margin-bottom: 25px; }
        .logo { font-family: 'Poppins'; font-size: 1.7rem; font-weight: 700; color: white; display:flex; align-items:center; gap:12px; }
        .logo span { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }

        .dashboard { display: grid; grid-template-columns: 1fr 0.9fr; gap: 30px; }
        @media (max-width: 1100px) { .dashboard { grid-template-columns: 1fr; } }
        
        .card { padding: 35px; }
        h3 { font-family: 'Poppins'; margin-bottom: 30px; font-size: 1.5rem; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }

        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase; font-weight: 700; border-left: 3px solid var(--accent); padding-left: 12px; }
        
        input, select, textarea { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); 
            border-radius: 12px; color: white; outline: none; transition: 0.3s; font-size: 1rem;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); background: rgba(255,255,255,0.05); }
        
        .tall-textarea { min-height: 110px; resize: none; }
        .main-textarea { min-height: 200px; resize: none; border-left: 4px solid var(--accent); }
        .error-field { border-color: var(--critica) !important; box-shadow: 0 0 12px var(--error-glow) !important; }

        .main-btn {
            background: var(--accent); color: #000; padding: 20px; border-radius: 12px; border: none;
            font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; margin-top:20px; transition: 0.3s; font-size: 1.1rem;
        }
        .main-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 25px var(--accent-glow); filter: brightness(1.1); }

        .ticket-list { max-height: 850px; overflow-y: auto; padding-right: 15px; }
        .ticket-item { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 18px;
            padding: 25px; margin-bottom: 20px; display: flex; justify-content: space-between; gap: 20px;
            border-left: 5px solid var(--accent); transition: 0.3s;
        }
        .ticket-item:hover { background: rgba(255,255,255,0.06); transform: translateX(8px); }

        .badge { padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 900; }
        .bg-open { background: var(--accent); color: black; }
        .bg-process { background: var(--warning); color: black; }
        .bg-closed { background: #475569; color: white; }

        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:none; place-items:center; z-index:1000; padding:20px; }
    </style>
</head>
<body>

    <div class="container">
        <nav class="glass">
            <div class="logo"><i data-lucide="shield-check"></i> GTIM <span>SERVICE DESK</span></div>
            <div id="nav-actions"></div>
        </nav>
        <div id="main-view"></div>
    </div>

    <!-- Modal para cerrar ticket -->
    <div id="resolve-modal" class="modal">
        <div class="glass card modal-content" style="max-width: 600px; width: 100%;">
            <h3>Cierre de Ticket</h3>
            <div class="form-group">
                <label>Detalles de la Solución Técnica</label>
                <textarea id="resolve-msg" class="main-textarea" placeholder="Escribe aquí los pasos realizados para solucionar el ticket..." oninput="this.classList.remove('error-field')"></textarea>
            </div>
            <div style="display:flex; gap:15px">
                <button class="main-btn" onclick="app.confirmResolve()" style="background:var(--success)">Cerrar Solicitud</button>
                <button class="main-btn" onclick="document.getElementById('resolve-modal').style.display='none'" style="background:#334155; color:white">Regresar</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xpdvvdnwzqyjvnxpivvc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_18PzzKKfqb20-ksjQGF_8g_-oZZNUll';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let user = null;
        let activeTicketId = null;

        const app = {
            init: () => { app.show('login'); },
            show: (view) => {
                const views = {
                    login: `
                        <div style="display:grid; place-items:center; height:70vh">
                            <div class="glass card" style="width:420px; text-align:center">
                                <h2 style="margin-bottom:30px">Inicia Sesión</h2>
                                <input type="email" id="l-email" placeholder="Correo GTIM" style="margin-bottom:15px">
                                <input type="password" id="l-pass" placeholder="Password" style="margin-bottom:25px">
                                <button class="main-btn" onclick="app.doLogin()">Entrar al Sistema</button>
                                <p style="margin-top:20px; font-size:0.8rem; color:var(--text-dim)">¿Nuevo? <a href="#" onclick="app.show('reg')" style="color:var(--accent)">Regístrate</a></p>
                            </div>
                        </div>`,
                    reg: `
                        <div style="display:grid; place-items:center; height:70vh">
                            <div class="glass card" style="width:420px; text-align:center">
                                <h2 style="margin-bottom:30px">Registro Corporativo</h2>
                                <input type="text" id="r-name" placeholder="Nombre Completo" style="margin-bottom:15px">
                                <input type="email" id="r-email" placeholder="Email @gtim.mx" style="margin-bottom:15px">
                                <input type="password" id="r-pass" placeholder="Definir Password" style="margin-bottom:25px">
                                <button class="main-btn" onclick="app.doReg()">Crear Cuenta</button>
                                <button class="main-btn" onclick="app.show('login')" style="background:transparent; color:white; border:1px solid var(--glass-border); margin-top:10px">Volver</button>
                            </div>
                        </div>`,
                    home: `
                        <div class="dashboard">
                            <div class="glass card">
                                <h3><i data-lucide="plus-circle"></i> Nueva Solicitud</h3>
                                <div class="field-row">
                                    <div class="form-group"><label>Nombre del Proyecto</label>
                                        <input type="text" id="f-proy" placeholder="Proyecto" oninput="this.classList.remove('error-field')">
                                    </div>
                                    <div class="form-group"><label>Área Solicitante</label>
                                        <select id="f-area" onchange="this.classList.remove('error-field')"><option value="">-- Seleccionar --</option><option>QA</option><option>DEV</option><option>F4</option><option>OTROS</option></select>
                                    </div>
                                </div>
                                <div class="field-row">
                                    <div class="form-group"><label>Tipo de Solicitud</label>
                                        <select id="f-tipo" onchange="this.classList.remove('error-field')"><option value="">-- Seleccionar --</option><option>Instalación de Imágenes</option><option>Respaldo de Imágenes</option><option>Configuración de impresoras</option><option>Movimiento de equipos</option><option>Solicitud de IPs</option></select>
                                    </div>
                                    <div class="form-group"><label>Prioridad</label>
                                        <select id="f-prio" onchange="this.classList.remove('error-field')"><option value="">-- Seleccionar --</option><option>Baja</option><option>Media</option><option>Alta</option><option>Critica</option></select>
                                    </div>
                                </div>
                                <div class="field-row">
                                    <div class="form-group"><label>Información del Equipo (IP + Ubicación)</label>
                                        <textarea id="f-info" class="tall-textarea" oninput="this.classList.remove('error-field')"></textarea>
                                    </div>
                                    <div class="form-group"><label>Modelo del Equipo</label>
                                        <textarea id="f-mod" class="tall-textarea" oninput="this.classList.remove('error-field')"></textarea>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Descripción de Solicitud</label>
                                    <textarea id="f-desc" class="main-textarea" oninput="this.classList.remove('error-field')" placeholder="Captura aquí el detalle de tu requerimiento..."></textarea>
                                </div>
                                <button class="main-btn" onclick="app.sendTicket()">Generar Solicitud</button>
                            </div>
                            <div class="glass card">
                                <h3><i data-lucide="layers"></i> Mis Solicitudes</h3>
                                <div id="user-list" class="ticket-list">Cargando...</div>
                            </div>
                        </div>`,
                    admin: `
                        <div class="glass card">
                            <h3><i data-lucide="shield"></i> Master Service Console</h3>
                            <div id="admin-list" class="ticket-list">Panel de gestión global...</div>
                        </div>`
                };
                document.getElementById('main-view').innerHTML = views[view] || views.login;
                lucide.createIcons();
                app.updateNav();
                if(view === 'home') app.loadUserTickets();
                if(view === 'admin') app.loadAdmin();
            },

            updateNav: () => {
                const nav = document.getElementById('nav-actions');
                nav.innerHTML = user ? `<button onclick="app.logout()" style="color:var(--text-dim); background:none; border:none; cursor:pointer; font-weight:600">Cerrar Sesión (${user.nombre_completo})</button>` : '';
            },

            doLogin: async () => {
                const { data } = await sb.from('usuarios').select('*').eq('email', document.getElementById('l-email').value).eq('password', document.getElementById('l-pass').value).single();
                if(data) { user = data; app.show(user.rol === 'Usuario Soporte Tecnico' ? 'admin' : 'home'); } else alert("No se encontró el usuario.");
            },

            doReg: async () => {
                const { error } = await sb.from('usuarios').insert([{ nombre_completo: document.getElementById('r-name').value, email: document.getElementById('r-email').value, password: document.getElementById('r-pass').value }]);
                if(!error) { alert("¡Registro Exitoso!"); app.show('login'); }
            },

            sendTicket: async () => {
                const fields = ['f-proy', 'f-area', 'f-tipo', 'f-prio', 'f-info', 'f-mod', 'f-desc'];
                let hasError = false;
                fields.forEach(id => { if(!document.getElementById(id).value.trim()){ document.getElementById(id).classList.add('error-field'); hasError = true; } });
                
                if(hasError) return alert("Por favor llena todos los campos resaltados.");

                const now = new Date();
                const tckId = `TCK-${now.getDate()}${now.getMonth()+1}${now.getFullYear()}${now.getHours()}${now.getMinutes()}${now.getSeconds()}`;
                
                const tData = {
                    id_solicitud: tckId, proyecto: document.getElementById('f-proy').value, area: document.getElementById('f-area').value,
                    tipo: document.getElementById('f-tipo').value, prioridad: document.getElementById('f-prio').value,
                    equipo_info: document.getElementById('f-info').value, equipo_modelo: document.getElementById('f-mod').value,
                    descripcion: document.getElementById('f-desc').value, autor_nombre: user.nombre_completo,
                    autor_email: user.email, estado: 'Abierto'
                };

                const { error } = await sb.from('tickets').insert([tData]);
                
                if(!error) {
                    // --- PREPARAR OUTLOOK ---
                    const destinatario = "soporte@gtim.mx"; // <-- Ajusta aquí el correo de la mesa de ayuda
                    const asunto = `Solicitud Soporte Técnico - Folio: ${tData.id_solicitud}`;
                    const cuerpo = 
`SOLICITUD DE SOPORTE TÉCNICO - GTIM
----------------------------------------
ID SOLICITUD: ${tData.id_solicitud}
----------------------------------------
ÁREA SOLICITANTE: ${tData.area}
NOMBRE PROYECTO: ${tData.proyecto}
NOMBRE DEL SOLICITANTE: ${tData.autor_nombre}
INFORMACIÓN DEL EQUIPO: ${tData.equipo_info}
MODELO DEL EQUIPO: ${tData.equipo_modelo}
----------------------------------------
DESCRIPCIÓN DE SOLICITUD:
${tData.descripcion}
----------------------------------------
Mensaje generado automáticamente desde GTIM Service Desk.`;

                    window.location.href = `mailto:${destinatario}?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`;
                    
                    alert("¡Ticket Guardado! Se abrirá Outlook para confirmar el envío.");
                    app.show('home');
                }
            },

            loadUserTickets: async () => {
                const { data } = await sb.from('tickets').select('*').eq('autor_email', user.email).order('id', {ascending: false});
                document.getElementById('user-list').innerHTML = data.map(t => `
                    <div class="ticket-item">
                        <div><small>${t.id_solicitud}</small><h4>${t.proyecto}</h4><p>${t.tipo}</p></div>
                        <div style="text-align:right"><span class="badge ${t.estado === 'Abierto' ? 'bg-open' : t.estado === 'Cerrado' ? 'bg-closed' : 'bg-process'}">${t.estado}</span></div>
                    </div>`).join('') || '<p style="text-align:center; color:var(--text-dim)">Sin tickets activos.</p>';
            },

            loadAdmin: async () => {
                const { data } = await sb.from('tickets').select('*').order('id', {ascending: false});
                document.getElementById('admin-list').innerHTML = data.map(t => `
                    <div class="ticket-item">
                        <div style="flex:1">
                            <small>${t.id_solicitud} | ${t.autor_nombre}</small>
                            <h4>${t.proyecto} - ${t.area}</h4>
                            <p style="color:var(--text-dim); font-size:0.8rem">${t.tipo} | ${t.equipo_modelo}</p>
                            <div style="margin-top:10px; background:rgba(0,0,0,0.3); padding:15px; border-radius:10px; font-size:0.9rem">${t.descripcion}</div>
                            ${t.respuesta ? `<div style="margin-top:10px; color:var(--success)"><b>Solución:</b> ${t.respuesta}</div>` : ''}
                        </div>
                        <div style="text-align:right; min-width:140px">
                            <span class="badge ${t.estado === 'Abierto' ? 'bg-open' : t.estado === 'Cerrado' ? 'bg-closed' : 'bg-process'}">${t.estado}</span>
                            <div style="margin-top:20px">
                                ${t.estado === 'Abierto' ? `<button class="main-btn" onclick="app.claim(${t.id})" style="font-size:0.8rem; padding:10px">Atender</button>` : 
                                  t.estado === 'En Proceso' && t.tecnico_asignado === user.nombre_completo ? `<button class="main-btn" onclick="app.openResolve(${t.id})" style="background:var(--success)">Cerrar</button>` : 
                                  `<small style="color:var(--accent)">Por: ${t.tecnico_asignado || 'Otro técnico'}</small>`}
                            </div>
                        </div>
                    </div>`).join('');
            },

            claim: async (id) => { await sb.from('tickets').update({ tecnico_asignado: user.nombre_completo, estado: 'En Proceso' }).eq('id', id); app.loadAdmin(); },
            openResolve: (id) => { activeTicketId = id; document.getElementById('resolve-modal').style.display = 'grid'; },
            confirmResolve: async () => {
                const msg = document.getElementById('resolve-msg').value;
                if(!msg.trim()){ document.getElementById('resolve-msg').classList.add('error-field'); return; }
                const { error } = await sb.from('tickets').update({ estado: 'Cerrado', respuesta: msg, fecha_cierre: new Date() }).eq('id', activeTicketId);
                if(!error){ document.getElementById('resolve-modal').style.display = 'none'; app.loadAdmin(); }
            },
            logout: () => { user = null; app.show('login'); }
        };

        app.init();
    </script>
</body>
</html>
