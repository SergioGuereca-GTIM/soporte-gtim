<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTIM Service Desk v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b101b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --text: #ffffff;
            --text-dim: #94a3b8;
            --critica: #ff3d00;
            --success: #00e676;
            --warning: #ffb300;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; background: radial-gradient(circle at top right, #1a233a, #0b101b); }
        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .container { max-width: 1350px; margin: 0 auto; padding: 25px; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; margin-bottom: 25px; }
        .logo { font-family: 'Poppins'; font-size: 1.7rem; font-weight: 700; color: white; display:flex; align-items:center; gap:12px; cursor:pointer; }
        .logo span { color: var(--accent); }

        .dashboard { display: grid; grid-template-columns: 1fr 0.9fr; gap: 30px; }
        @media (max-width: 1100px) { .dashboard { grid-template-columns: 1fr; } }
        
        .card { padding: 30px; margin-bottom: 20px; }
        h3 { font-family: 'Poppins'; margin-bottom: 25px; font-size: 1.3rem; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--glass-border); padding-bottom: 12px; }

        label { display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; font-weight: 700; opacity: 0.8; }
        .info-val { font-size: 1rem; margin-bottom: 15px; color: white; }

        input, select, textarea { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); 
            border-radius: 12px; color: white; outline: none; font-size: 1rem;
        }

        .main-btn {
            background: var(--accent); color: #000; padding: 18px; border-radius: 12px; border: none;
            font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .main-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 25px var(--accent-glow); }

        .ticket-item { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 18px;
            padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; gap: 20px;
            border-left: 5px solid var(--accent); cursor: pointer; transition: 0.3s;
        }
        .ticket-item:hover { background: rgba(255,255,255,0.06); transform: translateX(8px); }

        .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .badge { padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; }
        .bg-open { background: var(--accent); color: black; }
        .bg-process { background: var(--warning); color: black; }
        .bg-closed { background: #475569; color: white; }

        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:none; place-items:center; z-index:1000; padding:20px; }
    </style>
</head>
<body>

    <div class="container">
        <nav class="glass">
            <div class="logo" onclick="app.show(user.rol === 'Usuario Soporte Tecnico' ? 'admin' : 'home')"><i data-lucide="shield-check"></i> GTIM <span>SERVICE DESK</span></div>
            <div id="nav-actions"></div>
        </nav>
        <div id="main-view"></div>
    </div>

    <!-- Modal Admin Reutilizable -->
    <div id="resolve-modal" class="modal">
        <div class="glass card modal-content" style="max-width: 600px; width: 100%;">
            <h3>Cierre de Ticket</h3>
            <textarea id="resolve-msg" style="height:150px" placeholder="Respuesta técnica..."></textarea>
            <div style="display:flex; gap:15px; margin-top:20px">
                <button class="main-btn" onclick="app.confirmResolve()" style="flex:1; background:var(--success)">Resolver</button>
                <button class="main-btn" onclick="document.getElementById('resolve-modal').style.display='none'" style="flex:1; background:#444; color:white">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xpdvvdnwzqyjvnxpivvc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_18PzzKKfqb20-ksjQGF_8g_-oZZNUll';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let user = null;
        let activeTicketId = null;

        const app = {
            init: () => { app.show('login'); },
            show: (view, data = null) => {
                const views = {
                    login: `
                        <div style="display:grid; place-items:center; height:70vh">
                            <div class="glass card" style="width:400px; text-align:center">
                                <h2>Login</h2>
                                <input type="email" id="l-email" placeholder="Email" style="margin-top:20px">
                                <input type="password" id="l-pass" placeholder="Password" style="margin-top:15px; margin-bottom:20px">
                                <button class="main-btn" style="width:100%" onclick="app.doLogin()">Entrar</button>
                            </div>
                        </div>`,
                    home: `
                        <div class="dashboard">
                            <div class="glass card">
                                <h3><i data-lucide="plus-circle"></i> Nueva Solicitud</h3>
                                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
                                    <div class="form-group"><label>Proyecto</label><input type="text" id="f-proy"></div>
                                    <div class="form-group"><label>Área</label><select id="f-area"><option value="">--</option><option>QA</option><option>DEV</option><option>F4</option></select></div>
                                </div>
                                <div class="form-group"><label>Tipo</label><select id="f-tipo"><option value="">--</option><option>Instalación</option><option>Respaldo</option><option>Redes</option></select></div>
                                <div class="form-group"><label>Prioridad</label><select id="f-prio"><option value="">--</option><option>Baja</option><option>Media</option><option>Alta</option><option>Critica</option></select></div>
                                <div class="form-group"><label>Info Equipo (IP/Ubicación)</label><textarea id="f-info" style="height:80px"></textarea></div>
                                <div class="form-group"><label>Modelo</label><input type="text" id="f-mod"></div>
                                <div class="form-group"><label>Descripción de Solicitud</label><textarea id="f-desc" style="height:120px"></textarea></div>
                                <button class="main-btn" style="width:100%" onclick="app.sendTicket()">Enviar Ticket</button>
                            </div>
                            <div class="glass card">
                                <h3><i data-lucide="layers"></i> Mis Solicitudes</h3>
                                <div id="user-list">Cargando...</div>
                            </div>
                        </div>`,
                    detail: data ? `
                        <div class="glass card" style="border-left: 6px solid var(--accent)">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
                                <h3><i data-lucide="file-text"></i> Historial de Solicitud</h3>
                                <span class="badge ${data.estado === 'Abierto' ? 'bg-open' : data.estado === 'Cerrado' ? 'bg-closed' : 'bg-process'}">${data.estado}</span>
                            </div>
                            
                            <div class="glass card" style="background:rgba(0,0,0,0.2)">
                                <label>Descripción General</label>
                                <div class="detail-grid">
                                    <div><label>Id Solicitud</label><div class="info-val">${data.id_solicitud}</div></div>
                                    <div><label>Fecha Solicitud</label><div class="info-val">${new Date(data.created_at).toLocaleDateString()}</div></div>
                                    <div><label>Fecha de Cierre</label><div class="info-val">${data.fecha_cierre ? new Date(data.fecha_cierre).toLocaleDateString() : 'Sin cerrar'}</div></div>
                                    <div><label>Tipo Solicitud</label><div class="info-val">${data.tipo}</div></div>
                                    <div><label>Prioridad</label><div class="info-val">${data.prioridad}</div></div>
                                </div>
                            </div>

                            <div class="glass card" style="background:rgba(0,0,0,0.2)">
                                <label>Información de la Solicitud</label>
                                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px">
                                    <div>
                                        <label>Solicitante</label><div class="info-val">${data.autor_nombre}</div>
                                        <label>Área</label><div class="info-val">${data.area}</div>
                                        <label>Proyecto</label><div class="info-val">${data.proyecto}</div>
                                        <label>Modelo del equipo</label><div class="info-val">${data.equipo_modelo}</div>
                                    </div>
                                    <div>
                                        <label>Descripción del Problema</label><div class="info-val" style="background:rgba(0,0,0,0.3); padding:10px; border-radius:10px">${data.descripcion}</div>
                                        <label>Información del equipo</label><div class="info-val">${data.equipo_info}</div>
                                    </div>
                                </div>
                            </div>

                            <div class="glass card" style="background:rgba(0,0,0,0.2); border-left: 4px solid var(--success)">
                                <label>Respuesta del Equipo de Soporte</label>
                                <div style="display:flex; justify-content:space-between; margin-bottom:10px">
                                    <div class="info-val" style="font-style:italic">${data.respuesta || 'Sin respuesta aún'}</div>
                                    <div><label>Asignado:</label> <div class="info-val" style="color:var(--accent)">${data.tecnico_asignado || 'Pendiente'}</div></div>
                                </div>
                            </div>

                            <button class="main-btn" onclick="app.show('home')" style="width:200px; float:right; background:#334155; color:white">Regresar</button>
                            <div style="clear:both"></div>
                        </div>` : '',
                    admin: `<div class="glass card"><h3>Panel de Control</h3><div id="admin-list"></div></div>`
                };

                document.getElementById('main-view').innerHTML = views[view];
                lucide.createIcons();
                app.updateNav();
                if(view === 'home') app.loadUserTickets();
                if(view === 'admin') app.loadAdmin();
            },

            updateNav: () => {
                const nav = document.getElementById('nav-actions');
                nav.innerHTML = user ? `<button onclick="app.logout()" style="color:var(--text-dim); background:none; border:none; cursor:pointer">Salir (${user.nombre_completo})</button>` : '';
            },

            doLogin: async () => {
                const { data } = await sb.from('usuarios').select('*').eq('email', document.getElementById('l-email').value).eq('password', document.getElementById('l-pass').value).single();
                if(data) { user = data; app.show(user.rol === 'Usuario Soporte Tecnico' ? 'admin' : 'home'); } else alert("Error");
            },

            sendTicket: async () => {
                const tckId = `TCK-${Date.now()}`;
                const t = {
                    id_solicitud: tckId, proyecto: document.getElementById('f-proy').value, area: document.getElementById('f-area').value,
                    tipo: document.getElementById('f-tipo').value, prioridad: document.getElementById('f-prio').value,
                    equipo_info: document.getElementById('f-info').value, equipo_modelo: document.getElementById('f-mod').value,
                    descripcion: document.getElementById('f-desc').value, autor_nombre: user.nombre_completo,
                    autor_email: user.email, estado: 'Abierto'
                };
                await sb.from('tickets').insert([t]);
                alert("Guardado!"); app.show('home');
            },

            loadUserTickets: async () => {
                const { data } = await sb.from('tickets').select('*').eq('autor_email', user.email).order('id', {ascending: false});
                document.getElementById('user-list').innerHTML = data.map(t => `
                    <div class="ticket-item" onclick="app.viewDetail(${t.id})">
                        <div><small>${t.id_solicitud}</small><h4>${t.proyecto}</h4><p>${t.tipo}</p></div>
                        <div style="text-align:right"><span class="badge ${t.estado === 'Abierto' ? 'bg-open' : t.estado === 'Cerrado' ? 'bg-closed' : 'bg-process'}">${t.estado}</span></div>
                    </div>`).join('') || 'Cero tickets.';
            },

            viewDetail: async (id) => {
                const { data } = await sb.from('tickets').select('*').eq('id', id).single();
                app.show('detail', data);
            },

            loadAdmin: async () => {
                const { data } = await sb.from('tickets').select('*').order('id', {ascending: false});
                document.getElementById('admin-list').innerHTML = data.map(t => `
                    <div class="ticket-item" onclick="app.viewDetail(${t.id})">
                        <div style="flex:1"><small>${t.id_solicitud}</small><h4>${t.proyecto} - ${t.autor_nombre}</h4></div>
                        <div style="text-align:right">
                            ${t.estado === 'Abierto' ? `<button class="main-btn" style="padding:5px 10px" onclick="event.stopPropagation(); app.claim(${t.id})">Atender</button>` : 
                              t.estado === 'En Proceso' ? `<button class="main-btn" style="padding:5px 10px; background:var(--success)" onclick="event.stopPropagation(); app.openResolve(${t.id})">Cerrar</button>` : 'Finalizado'}
                        </div>
                    </div>`).join('');
            },

            claim: async (id) => { await sb.from('tickets').update({ tecnico_asignado: user.nombre_completo, estado: 'En Proceso' }).eq('id', id); app.loadAdmin(); },
            openResolve: (id) => { activeTicketId = id; document.getElementById('resolve-modal').style.display = 'grid'; },
            confirmResolve: async () => {
                const msg = document.getElementById('resolve-msg').value;
                await sb.from('tickets').update({ estado: 'Cerrado', respuesta: msg, fecha_cierre: new Date() }).eq('id', activeTicketId);
                document.getElementById('resolve-modal').style.display='none'; app.loadAdmin();
            },
            logout: () => { user = null; app.show('login'); }
        };

        app.init();
    </script>
</body>
</html>
