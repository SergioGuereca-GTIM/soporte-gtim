<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTIM Support - Sistema de Soporte Técnico</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0c0f17;
            --app-bg: radial-gradient(circle at 50% 50%, #161b2e 0%, #0c0f17 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --secondary-accent: #9d50bb;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --success: #00e676;
            --warning: #ffb300;
            --error: #ff5252;
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--text-primary); background: var(--app-bg); min-height: 100vh; overflow-x: hidden; line-height: 1.6; }
        .app-container { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
        .glass-nav { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 1.2rem; padding: 1rem 2rem; margin-bottom: 2rem; box-shadow: var(--card-shadow); }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 0.8rem; font-size: 1.5rem; font-weight: 700; font-family: 'Poppins', sans-serif; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }
        .logo-icon { color: var(--accent); filter: drop-shadow(0 0 8px var(--accent-glow)); }
        .screen-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 2rem; animation: slideUp 0.5s ease-out; }
        @media (max-width: 992px) { .screen-layout { grid-template-columns: 1fr; } }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(8px); border: 1px solid var(--glass-border); border-radius: 1.5rem; padding: 2rem; box-shadow: var(--card-shadow); height: fit-content; }
        .glass-card h2 { font-family: 'Poppins', sans-serif; font-size: 1.8rem; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.4rem; }
        .form-input, .form-select, .form-textarea { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border); border-radius: 0.8rem; padding: 0.8rem 1rem; color: white; outline: none; transition: border 0.3s; }
        .form-input:focus { border-color: var(--accent); }
        .btn { padding: 0.8rem 1.5rem; border-radius: 0.8rem; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 0.6rem; transition: all 0.3s; }
        .btn-primary { background: var(--accent); color: var(--bg-color); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid var(--glass-border); }
        .ticket-item { background: rgba(0, 0, 0, 0.2); border-radius: 1rem; padding: 1.2rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent); cursor: pointer; transition: transform 0.2s; }
        .ticket-item:hover { transform: translateX(5px); background: rgba(255,255,255,0.05); }
        .status-badge { font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 0.5rem; text-transform: uppercase; font-weight: 700; background: var(--accent); color: #000; }
        .login-screen { display: flex; justify-content: center; align-items: center; min-height: 70vh; }
        .login-card { max-width: 450px; width: 100%; text-align: center; }
        .content-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

            </div>
        </nav>
        <main id="main-content" class="content-fade"></main>
