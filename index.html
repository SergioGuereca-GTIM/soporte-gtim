<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTIM Servicio Soporte Técnico 2.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b101b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --text: #ffffff;
            --text-dim: #94a3b8;
            --critica: #ff3d00;
            --success: #00e676;
            --warning: #ffb300;
            --error-glow: rgba(255, 61, 0, 0.3);
            --grad: radial-gradient(circle at top right, #1a233a, #0b101b);
        }

        body.light-mode {
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.08);
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.2);
            --text: #1e293b;
            --text-dim: #64748b;
            --critica: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --error-glow: rgba(239, 68, 68, 0.2);
            --grad: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            color-scheme: light;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; background: var(--grad); transition: background 0.4s, color 0.4s; }
        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .container { max-width: 1400px; margin: 0 auto; padding: 25px; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; margin-bottom: 25px; position: relative; }
        .logo { font-family: 'Poppins'; font-size: 1.7rem; font-weight: 700; color: var(--text); display:flex; align-items:center; gap:12px; z-index: 10; cursor: pointer; }
        .logo span { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }

        .welcome-msg { position: absolute; left: 50%; transform: translateX(-50%); font-size: 0.95rem; font-weight: 500; color: var(--text-dim); pointer-events: none; z-index: 5; }
        .welcome-msg b { color: var(--accent); }

        .nav-btns { display: flex; gap: 10px; align-items: center; z-index: 10; }
        .theme-btn { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text); padding: 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 42px; height: 42px; transition: 0.3s; }
        .theme-btn:hover { background: var(--accent); color: white; transform: rotate(15deg); }

        .logout-btn { background: rgba(255, 61, 0, 0.1); color: var(--critica); padding: 10px 22px; border: 1.5px solid var(--critica); border-radius: 12px; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; cursor: pointer; transition: 0.3s; }
        .logout-btn:hover { background: var(--critica); color: white; box-shadow: 0 0 15px var(--error-glow); transform: translateY(-2px); }

        .dashboard { display: grid; grid-template-columns: 1fr 0.9fr; gap: 30px; }
        @media (max-width: 1100px) { .dashboard { grid-template-columns: 1fr; } .welcome-msg { display: none; } }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: var(--glass); border: 1px solid var(--glass-border); padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .stat-box:hover { background: var(--glass-border); transform: translateY(-2px); }
        .stat-box.active { border-color: var(--accent); background: rgba(0, 242, 255, 0.08); box-shadow: 0 0 15px var(--accent-glow); }
        .stat-box h4 { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .stat-box p { font-size: 1.5rem; font-weight: 800; color: var(--accent); }

        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: 1fr 1fr; } }

        .admin-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; padding: 20px; border-left: 4px solid var(--accent); transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; min-height: 220px; }
        .admin-card:hover { transform: translateY(-3px); background: var(--glass-border); }
        
        .card { padding: 35px; }
        h3 { font-family: 'Poppins'; margin-bottom: 30px; font-size: 1.5rem; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase; font-weight: 700; border-left: 3px solid var(--accent); padding-left: 12px; }
        
        input, select, textarea { width: 100%; padding: 15px; background: rgba(0,0,0,0.1) !important; border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text); outline: none; transition: 0.3s; font-size: 1rem; }
        body.light-mode input, body.light-mode select, body.light-mode textarea { background: #fff !important; color: #1e293b; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

        .main-btn { background: var(--accent); color: #fff; padding: 18px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; margin-top:10px; transition: 0.3s; font-size: 1rem; }
        .main-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-sm { padding: 8px 15px; font-size: 0.75rem; margin: 0; }
        
        .badge { padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 900; }
        .bg-open { background: var(--accent); color: #fff; }
        .bg-process { background: var(--warning); color: #000; }
        .bg-closed { background: #64748b; color: white; }
        
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; place-items:center; z-index:1000; padding:20px; }
        .info-val { font-size: 1rem; color: var(--text); background: rgba(0,0,0,0.1); padding: 12px; border-radius: 10px; border: 1px solid var(--glass-border); }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }

        /* --- ESTILOS DASHBOARD ADMIN --- */
        .analytics-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px; }
        @media (max-width: 1000px) { .analytics-container { grid-template-columns: 1fr; } }
        
        .chart-card { background: var(--glass); border-radius: 20px; padding: 25px; border: 1px solid var(--glass-border); }
        
        /* Tarjetas de Técnicos */
        .tech-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 25px; }
        .tech-card { 
            background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; 
            padding: 20px; transition: 0.3s; border-top: 4px solid var(--accent);
        }
        .tech-card h4 { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 1rem; }
        .tech-stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; }
        .tech-stat-item { padding: 10px; background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid var(--glass-border); }
        .tech-stat-item b { display: block; font-size: 1.2rem; }
        .tech-stat-item span { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; }

        .sla-indicator { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; font-weight: 600; }
        .sla-indicator.fast { color: var(--success); }
        .sla-indicator.slow { color: var(--critica); }
        .sla-indicator.norm { color: var(--warning); }
        
        .ticket-item { padding: 20px; background: rgba(255,255,255,0.03); border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--glass-border); cursor: pointer; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }
        .ticket-item:hover { transform: translateX(5px); background: var(--glass-border); }
        
        .view-tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-dim); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <nav class="glass">
            <div class="logo" onclick="app.show(user ? (user.rol === 'Usuario Soporte Tecnico' ? 'admin' : 'home') : 'login')">
                <i data-lucide="shield-check"></i> GTIM <span>Servicio Soporte Técnico</span>
            </div>
            <div id="welcome-container" class="welcome-msg"></div>
            <div class="nav-btns" id="nav-actions"></div>
        </nav>
        <div id="main-view"></div>
    </div>

    <!-- Modal Resolución -->
    <div id="resolve-modal" class="modal">
        <div class="glass card modal-content" style="max-width: 600px; width: 100%;">
            <h3>Finalizar Solicitud</h3>
            <div class="form-group">
                <label>Detalles de la Solución Técnica</label>
                <textarea id="resolve-msg" style="min-height: 200px; resize: none;" placeholder="Pasos realizados para solucionar el ticket..."></textarea>
            </div>
            <div style="display:flex; gap:15px">
                <button class="main-btn" id="btn-confirm-resolve" style="background:var(--success)">Guardar y Cerrar</button>
                <button class="main-btn" onclick="document.getElementById('resolve-modal').style.display='none'" style="background:#334155; color:white">Volver</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xpdvvdnwzqyjvnxpivvc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_18PzzKKfqb20-ksjQGF_8g_-oZZNUll';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let user = null;
        let activeTicket = null;
        let currentFilter = 'Todos';
        let isLightMode = localStorage.getItem('theme') === 'light';

        if(isLightMode) document.body.classList.add('light-mode');

        const app = {
            init: () => { app.show('login'); },

            toggleTheme: () => {
                isLightMode = !isLightMode;
                document.body.classList.toggle('light-mode', isLightMode);
                localStorage.setItem('theme', isLightMode ? 'light' : 'dark');
                app.updateNav();
                if(document.getElementById('statsChart')) app.loadDashboard();
            },

            show: (view, data = null) => {
                const views = {
                    login: `<div style="display:grid; place-items:center; height:70vh"><div class="glass card" style="width:420px; text-align:center"><h2 style="margin-bottom:30px">Inicia Sesión</h2><input type="email" id="l-email" placeholder="Correo Corporativo"><input type="password" id="l-pass" placeholder="Password" style="margin-top:15px; margin-bottom:25px"><button class="main-btn" onclick="app.doLogin()">Entrar</button><p style="margin-top:20px; font-size:0.8rem; color:var(--text-dim)">¿Nuevo? <a href="#" onclick="app.show('reg')" style="color:var(--accent)">Crear Cuenta</a></p></div></div>`,
                    reg: `<div style="display:grid; place-items:center; height:70vh"><div class="glass card" style="width:420px; text-align:center"><h2 style="margin-bottom:30px">Registro Único</h2><input type="text" id="r-name" placeholder="Nombre Completo"><input type="email" id="r-email" placeholder="Email @gtim.mx" style="margin-top:15px"><input type="password" id="r-pass" placeholder="Password" style="margin-top:15px; margin-bottom:25px"><button class="main-btn" onclick="app.doReg()">Guardar</button><button class="main-btn" onclick="app.show('login')" style="background:transparent; color:var(--text); border:1px solid var(--glass-border); margin-top:10px">Regresar</button></div></div>`,
                    home: `
                        <div class="dashboard">
                            <div class="glass card">
                                <h3><i data-lucide="plus-circle"></i> Nueva Solicitud</h3>
                                <div class="field-row">
                                    <div class="form-group"><label>Proyecto</label><input type="text" id="f-proy"></div>
                                    <div class="form-group"><label>Área</label><select id="f-area"><option value="">-- Seleccionar --</option><option>QA</option><option>DEV</option><option>F4</option><option>OTROS</option></select></div>
                                </div>
                                <div class="field-row">
                                    <div class="form-group"><label>Tipo</label><select id="f-tipo"><option value="">-- Seleccionar --</option><option>Instalación de Imágenes</option><option>Respaldo de Imágenes</option><option>Configuración de impresoras</option><option>Movimiento de equipos</option><option>Solicitud de IPs</option></select></div>
                                    <div class="form-group"><label>Prioridad</label><select id="f-prio"><option value="">-- Seleccionar --</option><option>Baja</option><option>Media</option><option>Alta</option><option>Critica</option></select></div>
                                </div>
                                <div class="field-row">
                                    <div class="form-group"><label>Info Equipo (IP/UBI)</label><textarea id="f-info"></textarea></div>
                                    <div class="form-group"><label>Modelo</label><textarea id="f-mod"></textarea></div>
                                </div>
                                <div class="form-group"><label>Descripción</label><textarea id="f-desc" style="min-height:100px"></textarea></div>
                                <button class="main-btn" onclick="app.sendTicket()">Generar Solicitud</button>
                            </div>
                            <div class="glass card"><h3><i data-lucide="layers"></i> Mis Seguimientos</h3><div id="user-list"></div></div>
                        </div>`,
                    detail: data ? `
                        <div class="glass card" style="border-left: 6px solid var(--accent)">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
                                <h3><i data-lucide="file-text"></i> Detalle de Ticket</h3>
                                <span class="badge ${data.estado === 'Abierto' ? 'bg-open' : data.estado === 'Cerrado' ? 'bg-closed' : 'bg-process'}">${data.estado}</span>
                            </div>
                            <div class="detail-grid">
                                <div><label>Folio</label><div class="info-val">${data.id_solicitud}</div></div>
                                <div><label>Fecha</label><div class="info-val">${new Date(data.created_at).toLocaleString()}</div></div>
                                <div><label>Técnico</label><div class="info-val">${data.tecnico_asignado || 'Pendiente'}</div></div>
                            </div>
                            <div style="margin-top:20px"><label>Proyecto</label><div class="info-val">${data.proyecto}</div></div>
                            <div style="margin-top:20px"><label>Descripción</label><div class="info-val">${data.descripcion}</div></div>
                            ${data.respuesta ? `<div style="margin-top:20px"><label style="color:var(--success)">Resolución</label><div class="info-val" style="border-left:3px solid var(--success)">${data.respuesta}</div></div>` : ''}
                            <button class="main-btn" onclick="app.show(user.rol === 'Usuario Soporte Tecnico' ? 'admin' : 'home')" style="max-width:200px; background:#334155; color:white; margin-top:30px">Volver</button>
                        </div>` : '',
                    admin: `
                        <div class="glass card">
                            <div class="view-tabs">
                                <button class="tab-btn active" onclick="app.show('admin')"><i data-lucide="list"></i> Lista de Tickets</button>
                                <button class="tab-btn" onclick="app.show('dashboard_admin')"><i data-lucide="bar-chart-3"></i> Estadísticas Admin</button>
                            </div>
                            <h3><i data-lucide="shield"></i> Consola Operativa</h3>
                            <div class="stats-grid">
                                <div class="stat-box ${currentFilter === 'Todos' ? 'active' : ''}" onclick="app.filterAdmin('Todos')"><h4>Total</h4><p id="s-total">0</p></div>
                                <div class="stat-box ${currentFilter === 'Abierto' ? 'active' : ''}" onclick="app.filterAdmin('Abierto')"><h4>Nuevos</h4><p id="s-open" style="color:var(--accent)">0</p></div>
                                <div class="stat-box ${currentFilter === 'En Proceso' ? 'active' : ''}" onclick="app.filterAdmin('En Proceso')"><h4>En Proceso</h4><p id="s-proc" style="color:var(--warning)">0</p></div>
                                <div class="stat-box ${currentFilter === 'Cerrado' ? 'active' : ''}" onclick="app.filterAdmin('Cerrado')"><h4>Cerrados</h4><p id="s-closed" style="color:var(--success)">0</p></div>
                            </div>
                            <div id="admin-list" class="admin-grid"></div>
                        </div>`,
                    dashboard_admin: `
                        <div class="glass card">
                            <div class="view-tabs">
                                <button class="tab-btn" onclick="app.show('admin')"><i data-lucide="list"></i> Lista de Tickets</button>
                                <button class="tab-btn active" onclick="app.show('dashboard_admin')"><i data-lucide="bar-chart-3"></i> Estadísticas Admin</button>
                            </div>
                            
                            <h3 style="margin-bottom:15px"><i data-lucide="pie-chart"></i> Resumen de Operación</h3>
                            
                            <div class="analytics-container">
                                <div class="chart-card">
                                    <canvas id="statsChart"></canvas>
                                </div>
                                <div class="chart-card">
                                    <h4>Tiempos de Solución (SLA)</h4>
                                    <div id="sla-list" style="max-height:300px; overflow-y:auto; margin-top:15px"></div>
                                </div>
                            </div>

                            <h3 style="margin-top:40px; margin-bottom:20px"><i data-lucide="users"></i> Productividad por Técnico</h3>
                            <div id="tech-stats-grid" class="tech-grid"></div>
                        </div>`
                };
                document.getElementById('main-view').innerHTML = views[view] || views.login;
                lucide.createIcons();
                app.updateNav();
                if(view === 'home') app.loadUserTickets();
                if(view === 'admin') app.loadAdmin();
                if(view === 'dashboard_admin') app.loadDashboard();
            },

            updateNav: () => {
                const welcome = document.getElementById('welcome-container');
                const actions = document.getElementById('nav-actions');
                if(user) {
                    welcome.innerHTML = `Bienvenido: <b>${user.nombre_completo}</b>`;
                    actions.innerHTML = `<button class="theme-btn" onclick="app.toggleTheme()"><i data-lucide="${isLightMode ? 'moon' : 'sun'}"></i></button><button onclick="app.logout()" class="logout-btn">Salir</button>`;
                } else { welcome.innerHTML = ''; actions.innerHTML = ''; }
                lucide.createIcons();
            },

            doLogin: async () => {
                const { data } = await sb.from('usuarios').select('*').eq('email', document.getElementById('l-email').value).eq('password', document.getElementById('l-pass').value).single();
                if(data) { user = data; app.show(user.rol === 'Usuario Soporte Tecnico' ? 'admin' : 'home'); } else alert("Error de acceso.");
            },

            doReg: async () => {
                const { error } = await sb.from('usuarios').insert([{ nombre_completo: document.getElementById('r-name').value, email: document.getElementById('r-email').value, password: document.getElementById('r-pass').value }]);
                if(!error) { alert("¡Cuenta creada!"); app.show('login'); }
            },

            sendTicket: async () => {
                const t = { id_solicitud: 'TCK-'+Date.now(), proyecto: document.getElementById('f-proy').value, area: document.getElementById('f-area').value, tipo: document.getElementById('f-tipo').value, prioridad: document.getElementById('f-prio').value, equipo_info: document.getElementById('f-info').value, equipo_modelo: document.getElementById('f-mod').value, descripcion: document.getElementById('f-desc').value, autor_nombre: user.nombre_completo, autor_email: user.email, estado: 'Abierto' };
                await sb.from('tickets').insert([t]);
                alert("Solicitud enviada.");
                app.show('home');
            },

            loadUserTickets: async () => {
                const { data } = await sb.from('tickets').select('*').eq('autor_email', user.email).order('id', {ascending: false});
                document.getElementById('user-list').innerHTML = data.map(t => `<div class="ticket-item" onclick="app.show('detail', ${JSON.stringify(t).replace(/"/g, '&quot;')})"><div><small>${t.id_solicitud}</small><h4>${t.proyecto}</h4><p>${t.tipo}</p></div><span class="badge ${t.estado === 'Abierto' ? 'bg-open' : t.estado === 'Cerrado' ? 'bg-closed' : 'bg-process'}">${t.estado}</span></div>`).join('');
            },

            filterAdmin: (status) => { currentFilter = status; app.loadAdmin(); },

            loadAdmin: async () => {
                const { data: allData } = await sb.from('tickets').select('*').order('id', {ascending: false});
                if(!allData) return;
                document.getElementById('s-total').innerText = allData.length;
                document.getElementById('s-open').innerText = allData.filter(t => t.estado === 'Abierto').length;
                document.getElementById('s-proc').innerText = allData.filter(t => t.estado === 'En Proceso').length;
                document.getElementById('s-closed').innerText = allData.filter(t => t.estado === 'Cerrado').length;

                const filtered = currentFilter === 'Todos' ? allData : allData.filter(t => t.estado === currentFilter);
                document.getElementById('admin-list').innerHTML = filtered.map(t => {
                    const ts = JSON.stringify(t).replace(/"/g, '&quot;');
                    return `<div class="admin-card" onclick="app.show('detail', ${ts})">
                        <div style="display:flex; justify-content:space-between"><div><small style="color:var(--text-dim)">${t.id_solicitud}</small><h4>${t.proyecto}</h4></div><span class="badge ${t.estado === 'Abierto' ? 'bg-open' : t.estado === 'Cerrado' ? 'bg-closed' : 'bg-process'}">${t.estado}</span></div>
                        <div style="padding:10px; background:rgba(0,0,0,0.05); border-radius:10px; margin:15px 0; border-left:3px solid var(--accent)">
                            <small style="color:var(--text-dim)">Responsable</small><div>${t.tecnico_asignado || 'Sin asignar'}</div>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:auto">
                            <small>${new Date(t.created_at).toLocaleDateString()}</small>
                            <div style="display:flex; gap:5px">
                                ${t.estado === 'Abierto' ? `<button class="main-btn btn-sm" onclick="event.stopPropagation(); app.claim(${t.id})">Atender</button>` : ''}
                                ${t.estado === 'En Proceso' && t.tecnico_asignado === user.nombre_completo ? `<button class="main-btn btn-sm" style="background:var(--success)" onclick='event.stopPropagation(); app.openResolve(${ts})'>Cerrar</button>` : ''}
                            </div>
                        </div>
                    </div>`}).join('');
                lucide.createIcons();
            },

            claim: async (id) => { 
                await sb.from('tickets').update({ tecnico_asignado: user.nombre_completo, estado: 'En Proceso' }).eq('id', id); 
                app.loadAdmin(); 
            },
            
            openResolve: (t) => { activeTicket = t; document.getElementById('resolve-modal').style.display = 'grid'; document.getElementById('btn-confirm-resolve').onclick = () => app.confirmResolve(); },

            confirmResolve: async () => {
                const msg = document.getElementById('resolve-msg').value;
                if(!msg.trim()) return;
                const { error } = await sb.from('tickets').update({ estado: 'Cerrado', respuesta: msg, fecha_cierre: new Date() }).eq('id', activeTicket.id);
                if(!error){ document.getElementById('resolve-modal').style.display='none'; app.loadAdmin(); window.location.href = `mailto:${activeTicket.autor_email}?subject=Resuelto ${activeTicket.id_solicitud}&body=${msg}`; }
            },

            loadDashboard: async () => {
                const { data } = await sb.from('tickets').select('*');
                if(!data) return;

                // Gráfico General
                const stats = { Abierto: 0, 'En Proceso': 0, Cerrado: 0 };
                data.forEach(t => stats[t.estado]++);
                app.renderCharts(stats);

                // SLA List
                const closed = data.filter(t => t.estado === 'Cerrado' && t.fecha_cierre);
                document.getElementById('sla-list').innerHTML = closed.map(t => {
                    const diffHrs = Math.round((new Date(t.fecha_cierre) - new Date(t.created_at)) / (1000 * 60 * 60) * 10) / 10;
                    const cls = diffHrs < 4 ? 'fast' : (diffHrs > 24 ? 'slow' : 'norm');
                    return `<div style="padding:10px; border-bottom:1px solid var(--glass-border); display:flex; justify-content:space-between">
                        <div><small>${t.id_solicitud}</small><br>${t.proyecto}</div>
                        <div class="sla-indicator ${cls}"><i data-lucide="clock"></i> ${diffHrs}h</div>
                    </div>`;
                }).join('') || '<p style="color:var(--text-dim)">No hay datos de SLA.</p>';

                // Productividad por Técnico
                const techMap = {};
                data.forEach(t => {
                    if(!t.tecnico_asignado) return;
                    if(!techMap[t.tecnico_asignado]) techMap[t.tecnico_asignado] = { total: 0, proceso: 0, cerrados: 0 };
                    techMap[t.tecnico_asignado].total++;
                    if(t.estado === 'En Proceso') techMap[t.tecnico_asignado].proceso++;
                    if(t.estado === 'Cerrado') techMap[t.tecnico_asignado].cerrados++;
                });

                document.getElementById('tech-stats-grid').innerHTML = Object.keys(techMap).map(name => `
                    <div class="tech-card">
                        <h4><i data-lucide="user"></i> ${name}</h4>
                        <div class="tech-stats-row">
                            <div class="tech-stat-item"><b>${techMap[name].total}</b><span>Total</span></div>
                            <div class="tech-stat-item" style="border-bottom: 2px solid var(--warning)"><b>${techMap[name].proceso}</b><span>Proceso</span></div>
                            <div class="tech-stat-item" style="border-bottom: 2px solid var(--success)"><b>${techMap[name].cerrados}</b><span>Cerrados</span></div>
                        </div>
                    </div>
                `).join('') || '<p style="color:var(--text-dim); grid-column:1/-1; text-align:center">No hay técnicos con asignaciones.</p>';
                
                lucide.createIcons();
            },

            renderCharts: (stats) => {
                const ctx = document.getElementById('statsChart').getContext('2d');
                const textColor = document.body.classList.contains('light-mode') ? '#1e293b' : '#ffffff';
                if(window.myChart) window.myChart.destroy();
                window.myChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Nuevos', 'Proceso', 'Cerrados'],
                        datasets: [{ data: [stats.Abierto, stats['En Proceso'], stats.Cerrado], backgroundColor: ['#00f2ff', '#ffb300', '#00e676'], borderWidth: 0 }]
                    },
                    options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: textColor } } }, cutout: '75%' }
                });
            },

            logout: () => { user = null; app.show('login'); }
        };
        app.init();
    </script>
</body>
</html>
