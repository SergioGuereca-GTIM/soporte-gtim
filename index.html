<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTIM Support - Sistema de Soporte Técnico</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --gtim-blue: #1d71b8;
            --gtim-dark: #0c0f17;
            --accent: #00f2ff;
            --text-primary: #333;
            --text-secondary: #666;
            --success: #28a745;
            --warning: #ffb300;
            --error: #dc3545;
            --white: #ffffff;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--text-primary); background: var(--bg-color); min-height: 100vh; line-height: 1.6; }
        
        /* Navbar estilo Power Apps */
        .glass-nav { background: var(--gtim-blue); color: white; padding: 0.8rem 2rem; box-shadow: var(--card-shadow); }
        .nav-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 0.8rem; font-size: 1.2rem; font-weight: 700; }
        .logo span { color: white; font-weight: normal; margin-left: 5px; }

        .app-container { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
        
        .screen-layout { display: grid; grid-template-columns: 1fr 1.2fr; gap: 1.5rem; animation: slideUp 0.4s ease-out; }
        @media (max-width: 992px) { .screen-layout { grid-template-columns: 1fr; } }

        .glass-card { background: var(--white); border-radius: 0.5rem; padding: 1.5rem; box-shadow: var(--card-shadow); border: 1px solid #ddd; }
        .glass-card h2 { font-family: 'Poppins', sans-serif; font-size: 1.3rem; margin-bottom: 1.5rem; border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }

        /* Estilos de Formulario */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; }
        .form-group { margin-bottom: 1rem; }
        .form-group.full { grid-column: span 2; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.3rem; }
        .form-input, .form-select, .form-textarea { width: 100%; border: 1px solid #ccc; border-radius: 4px; padding: 0.6rem; font-size: 0.9rem; outline: none; }
        .form-input:focus { border-color: var(--gtim-blue); }

        /* Botonera */
        .actions-bar { display: flex; gap: 10px; margin-top: 1rem; }
        .btn { padding: 0.6rem 1.5rem; border-radius: 4px; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: 0.2s; }
        .btn-primary { background: var(--gtim-blue); color: white; }
        .btn-warning { background: var(--warning); color: black; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Panel de Soporte Filtros */
        .filter-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; background: white; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .filter-btn { padding: 5px 15px; border-radius: 20px; border: 1px solid #ddd; background: #f8f9fa; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
        .filter-btn.active { background: var(--gtim-blue); color: white; border-color: var(--gtim-blue); }

        /* Tickets List */
        .ticket-item { background: white; border: 1px solid #eee; border-radius: 8px; padding: 1rem; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; border-left: 5px solid var(--gtim-blue); }
        .ticket-item:hover { border-color: var(--gtim-blue); background: #f0f7ff; }
        .status-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .ticket-content { flex-grow: 1; }
        .ticket-meta { text-align: right; min-width: 120px; }
        
        .status-badge { font-size: 0.75rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
        .status-abierto { background: #e3f2fd; color: #1976d2; }
        .status-proceso { background: #fff3e0; color: #f57c00; }
        .status-cerrado { background: #e8f5e9; color: #2e7d32; }

        .login-screen { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .login-card { width: 100%; max-width: 400px; text-align: center; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <nav class="glass-nav">
        <div class="nav-content">
            <div class="logo"><i data-lucide="shield-check"></i> gtim <span>Sistema de Soporte GTIM</span></div>
            <div id="nav-actions-container"></div>
        </div>
    </nav>

    <div id="app" class="app-container">
        <main id="main-content"></main>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const SUPABASE_URL = 'https://xpdvvdnwzqyjvnxpivvc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_18PzzKKfqb20-ksjQGF_8g_-oZZNUll';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let state = {
            currentUser: null,
            currentView: 'login',
            tickets: [],
            filter: 'Todos',
            selectedTicket: null
        };

        // --- RENDERIZADO PRINCIPAL ---
        const render = () => {
            const main = document.getElementById('main-content');
            const navActions = document.getElementById('nav-actions-container');
            main.innerHTML = ''; navActions.innerHTML = '';

            if (state.currentUser) {
                navActions.innerHTML = `<span style="font-size:0.8rem; margin-right:15px">${state.currentUser.nombre_completo}</span><button class="btn btn-secondary" style="padding:4px 10px; font-size:0.7rem" onclick="logout()">Salir</button>`;
            }

            switch (state.currentView) {
                case 'login': main.appendChild(renderLogin()); break;
                case 'register': main.appendChild(renderRegister()); break;
                case 'home': main.appendChild(renderHome()); break;
                case 'support': main.appendChild(renderSupportPanel()); break;
                case 'support-detail': main.appendChild(renderSupportDetail()); break;
                case 'user-detail': main.appendChild(renderUserTicketDetail()); break;
            }
            if (window.lucide) window.lucide.createIcons();
        };

        // --- VISTAS ---

        const renderLogin = () => {
            const div = document.createElement('div'); div.className = 'login-screen';
            div.innerHTML = `
                <div class="glass-card login-card">
                    <h2 style="border:none">Iniciar Sesión</h2>
                    <form onsubmit="event.preventDefault(); handleLogin(this);">
                        <div class="form-group"><label>Email</label><input type="email" name="email" class="form-input" required placeholder="admin@gtim.com"></div>
                        <div class="form-group"><label>Contraseña</label><input type="password" name="password" class="form-input" required placeholder="gtim123"></div>
                        <button type="submit" class="btn btn-primary" style="width:100%">Entrar</button>
                    </form>
                    <p style="margin-top:1.5rem; font-size:0.8rem">¿No tienes cuenta? <a href="#" onclick="state.currentView='register'; render()">Regístrate aquí</a></p>
                </div>`;
            return div;
        };

        const renderHome = () => {
            const div = document.createElement('div'); div.className = 'screen-layout';
            div.innerHTML = `
                <div class="glass-card">
                    <h2>Crear Solicitud</h2>
                    <form onsubmit="event.preventDefault(); handleCreateTicket(this);">
                        <div class="form-grid">
                            <div class="form-group"><label>Tipo de Solicitud</label>
                                <select name="tipo" class="form-select">
                                    <option>Instalación de Imágenes</option><option>Respaldo de Imágenes</option>
                                    <option>Movimiento de equipos</option><option>Configuración de impresoras</option>
                                    <option>Validar conexión a la red</option>
                                </select>
                            </div>
                            <div class="form-group"><label>Prioridad</label>
                                <select name="prioridad" class="form-select"><option>Baja</option><option selected>Media</option><option>Alta</option><option>Critica</option></select>
                            </div>
                            <div class="form-group"><label>Área</label>
                                <select name="area" class="form-select"><option>QA</option><option>DEV</option><option>F4</option><option>OTROS</option></select>
                            </div>
                            <div class="form-group"><label>Nombre del proyecto</label><input name="proyecto" class="form-input" required></div>
                            <div class="form-group"><label>Información del Equipo</label><input name="info_equipo" class="form-input"></div>
                            <div class="form-group"><label>Modelo del Equipo</label><input name="modelo_equipo" class="form-input"></div>
                            <div class="form-group full"><label>Descripción</label><textarea name="descripcion" class="form-textarea" rows="3" required></textarea></div>
                        </div>
                        <div class="actions-bar"><button type="submit" class="btn btn-primary">Enviar</button><button type="reset" class="btn btn-secondary">Limpiar</button></div>
                    </form>
                </div>
                <div class="glass-card">
                    <h2>Mis Solicitudes</h2>
                    <div id="user-tickets-list">Cargando...</div>
                </div>`;
            loadTickets('user');
            return div;
        };

        const renderSupportPanel = () => {
            const div = document.createElement('div');
            div.innerHTML = `
                <div class="glass-card">
                    <h2 style="border:none">Atención de solicitudes Soporte Técnico GTIM</h2>
                    <div class="filter-bar">
                        <button class="filter-btn ${state.filter === 'Todos' ? 'active' : ''}" onclick="setFilter('Todos')">Todos</button>
                        <button class="filter-btn ${state.filter === 'Abierto' ? 'active' : ''}" onclick="setFilter('Abierto')">Abiertos</button>
                        <button class="filter-btn ${state.filter === 'En proceso' ? 'active' : ''}" onclick="setFilter('En proceso')">En Proceso</button>
                        <button class="filter-btn ${state.filter === 'Cerrado' ? 'active' : ''}" onclick="setFilter('Cerrado')">Cerrados</button>
                    </div>
                    <div id="support-tickets-list">Cargando listado...</div>
                </div>`;
            loadTickets('support');
            return div;
        };

        const renderSupportDetail = () => {
            const t = state.selectedTicket;
            const div = document.createElement('div'); div.className = 'screen-layout';
            div.innerHTML = `
                <div class="glass-card">
                    <h2>Datos de la Solicitud</h2>
                    <div style="font-size:0.9rem; display:grid; grid-template-columns:1fr 1fr; gap:10px">
                        <p><strong>ID Ticket:</strong> TCK-${t.id.toString().slice(-6)}</p>
                        <p><strong>Tipo:</strong> ${t.tipo_solicitud || 'N/A'}</p>
                        <p><strong>Solicitante:</strong> ${t.autor_nombre}</p>
                        <p><strong>Área:</strong> ${t.area || 'N/A'}</p>
                        <p><strong>Proyecto:</strong> ${t.proyecto}</p>
                        <p><strong>Prioridad:</strong> ${t.prioridad}</p>
                        <div style="grid-column: span 2; background:#f9f9f9; padding:10px; border-radius:4px; margin-top:10px">
                            <p><strong>Descripción:</strong><br>${t.descripcion}</p>
                        </div>
                    </div>
                </div>
                <div class="glass-card">
                    <h2>Respuesta Soporte Técnico</h2>
                    <form onsubmit="event.preventDefault(); handleUpdateTicket(this);">
                        <div class="form-group"><label>Cambio de estatus</label>
                            <select name="estado" class="form-select">
                                <option value="Abierto" ${t.estado === 'Abierto' ? 'selected' : ''}>Abierto</option>
                                <option value="En proceso" ${t.estado === 'En proceso' ? 'selected' : ''}>En proceso</option>
                                <option value="Cerrado" ${t.estado === 'Cerrado' ? 'selected' : ''}>Cerrado</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Respuesta</label>
                            <textarea name="respuesta" class="form-textarea" rows="6" placeholder="Escribe aquí la solución técnica...">${t.respuesta_soporte || ''}</textarea>
                        </div>
                        <div class="actions-bar">
                            <button type="submit" class="btn btn-warning">Guardar</button>
                            <button type="button" class="btn btn-primary" onclick="state.currentView='support'; render()">Regresar</button>
                        </div>
                    </form>
                </div>`;
            return div;
        };

        const renderUserTicketDetail = () => {
            const t = state.selectedTicket;
            const div = document.createElement('div');
            div.innerHTML = `
                <div class="glass-card" style="max-width:800px; margin:0 auto">
                    <h2>Historial de solicitud - #TCK-${t.id.toString().slice(-6)}</h2>
                    <div class="form-grid" style="margin-bottom:2rem">
                        <p><strong>Estatus:</strong> <span class="status-badge status-${t.estado.toLowerCase().replace(' ', '')}">${t.estado}</span></p>
                        <p><strong>Fecha:</strong> ${new Date(t.created_at).toLocaleDateString()}</p>
                        <p><strong>Tipo:</strong> ${t.tipo_solicitud || 'N/A'}</p>
                        <p><strong>Proyecto:</strong> ${t.proyecto}</p>
                    </div>
                    <div style="background:#f0f7ff; padding:1.5rem; border-radius:8px; border-left:4px solid var(--gtim-blue)">
                        <h4 style="margin-bottom:0.5rem">Respuesta de Soporte Técnico</h4>
                        <p>${t.respuesta_soporte || 'Sin respuesta aún. Estamos trabajando en ello.'}</p>
                        <p style="margin-top:1rem; font-size:0.8rem; color:var(--text-secondary)"><strong>Atendido por:</strong> ${t.asignado || 'Equipo GTIM'}</p>
                    </div>
                    <div class="actions-bar"><button class="btn btn-primary" onclick="state.currentView='home'; render()">Volver</button></div>
                </div>`;
            return div;
        };

        const renderRegister = () => {
             const div = document.createElement('div'); div.className = 'login-screen';
             div.innerHTML = `
                <div class="glass-card login-card">
                    <h2 style="border:none">Crear Cuenta GTIM</h2>
                    <form onsubmit="event.preventDefault(); handleRegister(this);">
                        <div class="form-group"><label>Nombre Completo</label><input type="text" name="name" class="form-input" required></div>
                        <div class="form-group"><label>Email</label><input type="email" name="email" class="form-input" required></div>
                        <div class="form-group"><label>Password</label><input type="password" name="password" class="form-input" required></div>
                        <button type="submit" class="btn btn-primary" style="width:100%">Registrarse</button>
                    </form>
                    <button class="btn btn-secondary" style="width:100%; margin-top:0.5rem" onclick="state.currentView='login'; render()">Volver</button>
                </div>`;
            return div;
        };

        // --- LÓGICA DE DATOS ---

        async function handleLogin(form) {
            const { data } = await supabase.from('usuarios').select('*').eq('email', form.email.value).eq('password', form.password.value).single();
            if (data) {
                state.currentUser = data;
                state.currentView = data.rol === 'Usuario Soporte Tecnico' ? 'support' : 'home';
                render();
            } else { alert('Acceso denegado'); }
        }

        async function handleRegister(form) {
            const { error } = await supabase.from('usuarios').insert([{ nombre_completo: form.name.value, email: form.email.value, password: form.password.value, rol: 'Usuario Solicitante' }]);
            if (!error) { alert('Listo! Logueate'); state.currentView='login'; render(); }
        }

        async function handleCreateTicket(form) {
            const { error } = await supabase.from('tickets').insert([{
                proyecto: form.proyecto.value, area: form.area.value, tipo_solicitud: form.tipo.value,
                prioridad: form.prioridad.value, descripcion: form.descripcion.value, equipo_info: form.info_equipo.value,
                equipo_modelo: form.modelo_equipo.value, autor_nombre: state.currentUser.nombre_completo,
                autor_email: state.currentUser.email, estado: 'Abierto'
            }]);
            if (!error) { alert('Solicitud enviada'); form.reset(); loadTickets('user'); }
        }

        async function loadTickets(mode) {
            let query = supabase.from('tickets').select('*').order('created_at', { ascending: false });
            if (mode === 'user') query = query.eq('autor_email', state.currentUser.email);
            else if (state.filter !== 'Todos') query = query.eq('estado', state.filter);
            
            const { data } = await query;
            const listId = mode === 'user' ? 'user-tickets-list' : 'support-tickets-list';
            const list = document.getElementById(listId);
            
            if (data && data.length > 0) {
                list.innerHTML = data.map(t => `
                    <div class="ticket-item" onclick="openDetail(${JSON.stringify(t).replace(/"/g, '&quot;')}, '${mode}')">
                        <div class="status-icon">
                            ${t.estado === 'Cerrado' ? '<i data-lucide="check-circle" style="color:var(--success)"></i>' : '<i data-lucide="clock" style="color:var(--gtim-blue)"></i>'}
                        </div>
                        <div class="ticket-content">
                            <strong>TCK-${t.id.toString().slice(-6)} - ${t.proyecto}</strong><br>
                            <small>${t.tipo_solicitud || 'General'} | ${new Date(t.created_at).toLocaleDateString()}</small>
                        </div>
                        <div class="ticket-meta">
                            <span class="status-badge status-${t.estado.toLowerCase().replace(' ', '')}">${t.estado}</span><br>
                            <small>${t.prioridad}</small>
                        </div>
                    </div>
                `).join('');
                if (window.lucide) window.lucide.createIcons();
            } else { list.innerHTML = '<p style="text-align:center; padding:2rem; color:#999">No hay registros.</p>'; }
        }

        window.openDetail = (t, mode) => {
            state.selectedTicket = t;
            state.currentView = mode === 'user' ? 'user-detail' : 'support-detail';
            render();
        };

        window.setFilter = (f) => { state.filter = f; render(); };

        async function handleUpdateTicket(form) {
            const oldStatus = state.selectedTicket.estado;
            const newStatus = form.estado.value;
            const updateData = { 
                estado: newStatus, 
                respuesta_soporte: form.respuesta.value,
                asignado: state.currentUser.nombre_completo
            };
            if (newStatus === 'Cerrado' && oldStatus !== 'Cerrado') {
                updateData.fecha_cierre = new Date().toISOString();
            }

            const { error } = await supabase.from('tickets').update(updateData).eq('id', state.selectedTicket.id);
            if (!error) { alert('Ticket Actualizado'); state.currentView = 'support'; render(); }
        }

        window.logout = () => { state.currentUser = null; state.currentView = 'login'; render(); };

        document.addEventListener('DOMContentLoaded', () => { render(); if (window.lucide) window.lucide.createIcons(); });
    </script>
</body>
</html>
